<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-animation">
  <span>{ }</span>
  <span>&lt;/&gt;</span>
  <span>0101</span>
  <span>Java</span>
  <span>[]</span>
  <span>AI</span>
  <span>if()</span>
  <span>CSS</span>
</div>

<div class="page-center">
<div class="container">

<header>
<h1>Sorting Algorithm Visualizer</h1>
<button id="themeToggle">🌙</button>
</header>

<div class="controls">
<select id="algorithmSelect">
<option value="bubble">Bubble Sort</option>
<option value="selection">Selection Sort</option>
<option value="insertion">Insertion Sort</option>
</select>

<button id="generateBtn">Generate Random</button>
<input type="text" id="customArray" placeholder="5,3,8,1">
<button id="setArrayBtn">Set Array</button>
<button id="resetBtn">Reset</button>
</div>

<div class="play-controls">
<button id="prevBtn">⏮ Previous</button>
<button id="nextBtn">⏭ Next</button>
<button id="autoPlayBtn">▶ Auto Play</button>
<button id="pauseBtn">⏸ Pause</button>

<label class="speed-box">
Speed:
<input type="range" id="speedSlider" min="100" max="2000" value="700">
</label>
</div>

<div id="arrayContainer" class="array-container"></div>

<div id="infoPanel" class="info-panel"></div>

<div class="code-box">
<h3>Java Function</h3>
<pre id="javaCode"></pre>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
